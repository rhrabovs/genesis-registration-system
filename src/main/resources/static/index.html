<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Genesis Registration System - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #eef1f5;
            display: flex;
            height: 100vh;
        }

        /* Levý panel – akce */
        .left-panel {
            width: 45%;
            padding: 20px;
            overflow-y: auto;
            background: #f7f9fc;
            border-right: 2px solid #ddd;
        }

        /* Pravý panel – výsledek */
        .right-panel {
            width: 55%;
            padding: 20px;
            background: #ffffff;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            font-size: 18px;
            color: #444;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        pre {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            height: calc(100% - 40px);
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="left-panel">
    <h1>Genesis Registration – Dashboard</h1>

    <div class="grid">

        <div class="card">
            <h2>1) Vytvořit uživatele</h2>
            <input id="c_name" placeholder="Jméno">
            <input id="c_surname" placeholder="Příjmení">
            <input id="c_personId" placeholder="PersonID (12 znaků)">
            <button onclick="createUser()">Vytvořit</button>
        </div>

        <div class="card">
            <h2>2) Získat uživatele</h2>
            <input id="g_id" placeholder="ID uživatele">
            <select id="g_detail">
                <option value="false">Short</option>
                <option value="true">Detail</option>
            </select>
            <button onclick="getUser()">Získat</button>
        </div>

        <div class="card">
            <h2>3) Všichni uživatelé</h2>
            <select id="ga_detail">
                <option value="false">Short</option>
                <option value="true">Detail</option>
            </select>
            <button onclick="getAllUsers()">Získat</button>
        </div>

        <div class="card">
            <h2>4) Upravit uživatele</h2>
            <input id="u_id" placeholder="ID">
            <input id="u_name" placeholder="Jméno">
            <input id="u_surname" placeholder="Příjmení">
            <button onclick="updateUser()">Upravit</button>
        </div>

        <div class="card">
            <h2>5) Smazat uživatele</h2>
            <input id="d_id" placeholder="ID uživatele">
            <button onclick="deleteUser()">Smazat</button>
        </div>

    </div>
</div>

<div class="right-panel">
    <h2>Výsledek API</h2>
    <pre id="output">Zde se zobrazí odpověď API...</pre>
</div>

<script>
    const API = "http://localhost:8080/api/v1/users";

    function show(data, isError = false) {
        const output = document.getElementById("output");
        output.textContent = JSON.stringify(data, null, 2);

        // Barvy podle výsledku
        output.style.color = isError ? "#ff4d4d" : "#00ff00";

        // Malá animace
        output.style.opacity = "0";
        setTimeout(() => output.style.opacity = "1", 150);
    }

    function clearCreateForm() {
        c_name.value = "";
        c_surname.value = "";
        c_personId.value = "";
    }

    function clearUserForm(){
        g_id.value = "";
    }

    function clearUpdateForm() {
        u_id.value = "";
        u_name.value = "";
        u_surname.value = "";
    }

    function clearDeleteForm() {
        d_id.value = "";
    }

    async function handleResponse(res) {
        const text = await res.text();

        try {
            const json = JSON.parse(text);
            show(json, !res.ok);
        } catch {
            show({ message: text }, !res.ok);
        }
    }

    async function createUser() {
        const body = {
            name: c_name.value,
            surname: c_surname.value,
            personId: c_personId.value
        };

        const res = await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        await handleResponse(res);

        if (res.ok) clearCreateForm();
    }

    async function getUser() {
        const id = g_id.value;
        const detail = g_detail.value;

        const res = await fetch(`${API}/${id}?detail=${detail}`);
        await handleResponse(res);

        clearUserForm();
    }

    async function getAllUsers() {
        const detail = ga_detail.value;

        const res = await fetch(`${API}?detail=${detail}`);
        await handleResponse(res);
    }

    async function updateUser() {
        const body = {
            id: u_id.value,
            name: u_name.value,
            surname: u_surname.value
        };

        const res = await fetch(API, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body)
        });

        await handleResponse(res);

        if (res.ok) clearUpdateForm();
    }

    async function deleteUser() {
        const id = d_id.value;

        const res = await fetch(`${API}/${id}`, {
            method: "DELETE"
        });

        if (res.status === 204) {
            show({ message: "Uživatel byl smazán." });
        } else {
            await handleResponse(res);
        }

        clearDeleteForm();
    }
</script>
</body>
</html>
